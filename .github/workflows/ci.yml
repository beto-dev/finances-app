name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Python API ───────────────────────────────────────────────

  api-lint:
    name: API — Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check apps/api/

  api-type-check:
    name: API — Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: apps/api/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt mypy
        working-directory: apps/api
      - name: Type check
        run: mypy .
        working-directory: apps/api

  api-test:
    name: API — Tests (pytest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: finances
          POSTGRES_PASSWORD: finances
          POSTGRES_DB: finances
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: apps/api/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio httpx
        working-directory: apps/api
      - name: Run migrations
        run: alembic upgrade head
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://finances:finances@localhost:5432/finances
      - name: Run tests
        run: pytest
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://finances:finances@localhost:5432/finances

  # ─── React Web ────────────────────────────────────────────────

  web-check:
    name: Web — Type check + Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: apps/web
      - name: Type check
        run: npm run type-check
        working-directory: apps/web
      - name: Lint
        run: npm run lint
        working-directory: apps/web

  web-build:
    name: Web — Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: apps/web
      - name: Build
        run: npm run build
        working-directory: apps/web
        env:
          VITE_API_URL: http://localhost:8000

  # ─── Security ─────────────────────────────────────────────────

  security-scan:
    name: Security — Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json
      - name: Install pip-audit and bandit
        run: pip install pip-audit bandit
      - name: Python dependency scan
        run: pip-audit -r apps/api/requirements.txt
      - name: Python SAST (bandit)
        run: bandit -r apps/api/ -ll --skip B105,B106 --exclude apps/api/tests,apps/api/alembic
      - name: Install web dependencies
        run: npm ci
        working-directory: apps/web
      - name: Node dependency scan
        run: npm audit --audit-level=high
        working-directory: apps/web
